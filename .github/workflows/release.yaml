name: release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/reusable_ci.yaml
  deploy_release:
    needs: ci
    uses: ./.github/workflows/reusable_deploy_release.yaml
    with:
      tag: ${{ github.ref_name }}
