name: release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/reusable_test.yaml
  build:
    uses: ./.github/workflows/reusable_build.yaml
  deploy_release:
    needs:
      - test
      - build
    uses: ./.github/workflows/reusable_deploy_release.yaml
    with:
      tag: ${{ github.ref_name }}
