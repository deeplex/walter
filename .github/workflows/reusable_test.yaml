name: quality and test

on: workflow_call

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20
  SOLUTION_FILE: Deeplex.Saverwalter.sln
  SOLUTION_PATH: ${{ github.workspace }}/Deeplex.Saverwalter.sln
  FRONTEND_DIR: Deeplex.Saverwalter.WebAPI/svelte

jobs:
  style:
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed frontend files
        id: changed-frontend
        uses: tj-actions/changed-files@v46
        with:
          files: |
            Deeplex.Saverwalter.WebAPI/svelte/**/*.ts
            Deeplex.Saverwalter.WebAPI/svelte/**/*.svelte
            Deeplex.Saverwalter.WebAPI/svelte/**/*.js

      - name: Setup Node.js
        if: ${{ steps.changed-frontend.outputs.any_changed == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack
        if: ${{ steps.changed-frontend.outputs.any_changed == 'true' }}
        run: corepack enable

      - name: Install frontend dependencies
        if: ${{ steps.changed-frontend.outputs.any_changed == 'true' }}
        working-directory: Deeplex.Saverwalter.WebAPI/svelte
        run: yarn install --immutable

      - name: Check changed frontend file formatting
        if: ${{ steps.changed-frontend.outputs.any_changed == 'true' }}
        working-directory: Deeplex.Saverwalter.WebAPI/svelte
        shell: bash
        run: |
          mapfile -t frontend_files < <(
            printf '%s\n' "${{ steps.changed-frontend.outputs.all_changed_files }}" \
              | tr ' ' '\n' \
              | sed 's#^Deeplex.Saverwalter.WebAPI/svelte/##' \
              | sed '/^$/d'
          )

          yarn prettier --check "${frontend_files[@]}"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution for style checks
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Verify .NET file formatting
        run: dotnet format whitespace "${{ env.SOLUTION_PATH }}" --verify-no-changes --no-restore

  test-svelte-quality:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Deeplex.Saverwalter.WebAPI/svelte
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Type-check frontend sources
        run: yarn check

      - name: Run frontend unit tests
        run: yarn vitest run --coverage

      - name: Upload frontend coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: Deeplex.Saverwalter.WebAPI/svelte/coverage
          if-no-files-found: error

  test-dotnet:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Run .NET test suite
        run: dotnet test "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore --settings "${{ github.workspace }}/.runsettings" --collect:"XPlat Code Coverage" --logger trx --results-directory artifacts/test-results/dotnet

      - name: Upload .NET test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: artifacts/test-results/dotnet
          if-no-files-found: error

  test-full-stack:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: walter_dev_full_generic_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies and Playwright
        working-directory: Deeplex.Saverwalter.WebAPI/svelte
        run: |
          yarn install --immutable
          yarn playwright install --with-deps chromium

      - name: Run full-stack test script
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASS: postgres
          WALTER_E2E_PASSWORD: postgres
        run: bash ./scripts/test-full-stack.sh

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            Deeplex.Saverwalter.WebAPI/svelte/playwright-report
            Deeplex.Saverwalter.WebAPI/svelte/test-results
          if-no-files-found: ignore
